<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KIND Nuts+ — Your Weekly Mix</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { margin: 0; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }

    .panel { position: relative; flex: 1; height: 685px; overflow: hidden; }

    /* Nut image */
    .panel-img {
      position: absolute;
      width: 240px;
      height: 360px;
      top: 161px;
      object-fit: cover;
    }
    .panel-img.centered { left: 50%; transform: translateX(-50%); }
    .panel-img.offset   { left: 58px; }

    /* Labels */
    .label {
      position: absolute;
      font-family: 'Helvetica Neue', Helvetica, sans-serif;
      font-weight: 700;
      font-size: 21px;
      color: white;
      text-align: center;
      line-height: 1.2;
      letter-spacing: -0.42px;
      width: 105px;
      transform: translateX(-50%);
    }

    /* Arrow SVGs */
    .arrow {
      position: absolute;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .arrow-top {
      left: 256px; top: 155px;
      width: 45px; height: 102px;
    }
    .arrow-bottom {
      left: 44px; top: 435px;
      width: 68px; height: 103px;
    }

    /* Fade-in animation */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .panel { animation: fadeUp 0.6s cubic-bezier(0.16,1,0.3,1) both; }
    .panel:nth-child(1) { animation-delay: 0.0s; }
    .panel:nth-child(2) { animation-delay: 0.08s; }
    .panel:nth-child(3) { animation-delay: 0.16s; }
    .panel:nth-child(4) { animation-delay: 0.24s; }

    /* Panel hover lift */
    .panel { transition: flex 0.35s cubic-bezier(0.16,1,0.3,1); cursor: default; }
    .panel:hover { flex: 1.12; }

    .panel::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0);
      transition: background 0.3s ease;
      pointer-events: none;
    }
    .panel:not(:hover)::after { background: rgba(0,0,0,0.08); }
  </style>
</head>
<body class="bg-white flex flex-col min-h-screen">

  <!-- Nav -->
  <nav style="background:#211f20; height:108px;" class="w-full shrink-0 flex items-center px-[86px] justify-between">
    <img src="brand_assets/KindNuts-logo.png"
         alt="KIND Nuts+" style="height:80px; aspect-ratio:1250/390; object-fit:contain;" />
    <div class="flex items-center gap-2">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><circle cx="9" cy="6" r="3" stroke="#f1f1f1" stroke-width="1.5"/><path d="M3 15c0-3.314 2.686-6 6-6s6 2.686 6 6" stroke="#f1f1f1" stroke-width="1.5" stroke-linecap="round"/></svg>
      <span style="font-family:Montserrat,sans-serif; font-weight:500; color:#f1f1f1; font-size:16px;">John Miller</span>
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M5 7l4 4 4-4" stroke="#f1f1f1" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
  </nav>

  <!-- 4-Panel showcase -->

          <path d="M82 2 L92 5 L87 14" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
        </svg>

      <div class="arrow arrow-bottom">

          <path d="M82 2 L92 5 L87 14" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

      <!-- Labels -->
      <p class="label" style="left:221.5px; top:126px; width:105px;">Honey Roasted</p>

      <!-- Nut image -->
      <img class="panel-img offset"

          <path d="M4 28 C30 26 75 8 92 5" stroke="white" stroke-width="2.2" stroke-linecap="round" fill="none"/>

    <!-- Panel 4 — Sea Salt / Apple Cider Vinegar — Teal -->

      <div class="arrow arrow-top">

          <path d="M4 28 C30 26 75 8 92 5" stroke="white" stroke-width="2.2" stroke-linecap="round" fill="none"/>
          <path d="M82 2 L92 5 L87 14" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  </div>

  <!-- Step CTA -->
  <div style="background:white; border-top:1px solid #e5e5e5; padding:20px 94px; display:flex; align-items:center; justify-content:space-between;">
    <div>
      <p style="font-size:14px; color:#888; margin:0; text-transform:uppercase; letter-spacing:0.08em; font-weight:500;">Step 2 of 4</p>
      <p style="font-size:18px; font-weight:700; color:#1a1a19; margin:4px 0 0; letter-spacing:-0.36px;">Here are your peanut flavors</p>
    </div>
    <a href="flavors.html"
       style="background:#1a1a19; color:white; font-size:16px; font-weight:700; padding:14px 40px; border-radius:999px; text-decoration:none; letter-spacing:-0.32px; transition:opacity 0.15s ease;"

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KIND Nuts+ — Questionnaire</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { margin: 0; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    // ─── Assets ───────────────────────────────────────────────────────────────
    const LOGO        = "https://www.figma.com/api/mcp/asset/a53a6ba0-407e-4e35-b5c7-f21ab7a986f6";
    const BG_TEXTURE  = "https://www.figma.com/api/mcp/asset/f3c994a2-8948-4480-b3c4-175e22351ea4";
    const ACCOUNT_ICO = "https://www.figma.com/api/mcp/asset/9c080dc4-3027-4829-980b-29b7d65c74ba";
    const CHEVRON     = "https://www.figma.com/api/mcp/asset/09619d4a-82bc-4d40-aa87-77d9ac361a5d";

    // ─── SVG Radio Icons ──────────────────────────────────────────────────────
    function RadioSelected() {
      return (
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
          <circle cx="12" cy="12" r="11" fill="#1a1a19"/>
          <circle cx="12" cy="12" r="5"  fill="white"/>
        </svg>
      );
    }
    function RadioDeactive() {
      return (
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
          <circle cx="12" cy="12" r="11" stroke="#dbd8d5" strokeWidth="2" fill="white"/>
        </svg>
      );
    }

    // ─── Nav ──────────────────────────────────────────────────────────────────
    function Nav() {
      return (
        <nav style={{backgroundColor:"#211f20"}}
             className="w-full h-[108px] shrink-0 flex items-center px-[86px] justify-between">
          <img src={LOGO} alt="KIND Nuts+" className="h-[80px] object-contain"
               style={{aspectRatio:"1250/390"}} />
          <div className="flex items-center gap-2">
            <img src={ACCOUNT_ICO} alt="" className="w-[18px] h-[18px]" />
            <span className="text-[#f1f1f1] text-[16px] font-medium"
                  style={{fontFamily:"Montserrat, sans-serif"}}>John Miller</span>
            <img src={CHEVRON} alt="" className="w-[18px] h-[18px]" />
          </div>
        </nav>
      );
    }

    // ─── Footer ───────────────────────────────────────────────────────────────
    function Footer() {
      return (
        <footer className="w-full shrink-0" style={{backgroundColor:"#1a1a19"}}>
          <div className="px-[83px] pt-[64px] pb-[40px] flex flex-col">
            <h2 className="text-white text-[32px] font-bold tracking-[-0.64px] mb-[62px]"
                style={{fontFamily:"Helvetica Neue, Helvetica, sans-serif"}}>
              Happier happens together
            </h2>
            <div className="flex gap-[32px] mb-[40px] flex-wrap">
              {["Accessibility","Privacy Policy","Site Map","Terms of Use"].map(l => (
                <a key={l} href="#"
                   className="text-white text-[14px] underline leading-[1.5]"
                   style={{fontFamily:"Helvetica Neue, Helvetica, sans-serif"}}>{l}</a>
              ))}
            </div>
            <hr className="border-t border-white/20 mb-[24px]" />
            <p className="text-white text-[12px] leading-[1.5]"
               style={{fontFamily:"Helvetica Neue, Helvetica, sans-serif"}}>
              © Copyright 2026 Mars
            </p>
          </div>
        </footer>
      );
    }

    // ─── Option Row ───────────────────────────────────────────────────────────
    function OptionRow({ label, selected, onClick }) {
      return (
        <button onClick={onClick}
          className="w-full flex items-center bg-white text-left transition-all duration-150"
          style={{
            minHeight: 56,
            border: selected ? "1.5px solid #1a1a19" : "1px solid #dbd8d5",
            borderRadius: 20,
          }}>
          <div className="flex items-center justify-center w-[56px] h-[56px] shrink-0">
            <div className="w-[32px] h-[32px] flex items-center justify-center overflow-hidden">
              {selected ? <RadioSelected /> : <RadioDeactive />}
            </div>
          </div>
          <span className="text-[16px] text-black leading-[1.5] pr-4"
                style={{fontFamily:"Helvetica Neue, Helvetica, sans-serif"}}>
            {label}
          </span>
        </button>
      );
    }

    // ─── Question Tile ────────────────────────────────────────────────────────
    function QuestionTile({ question, options, multiSelect, selected, onSelect, hint }) {
      return (
        <div className="w-full bg-white flex flex-col gap-[40px] p-[24px]"
             style={{borderRadius:24, boxShadow:"0px 1.4px 8px 0px rgba(26,26,25,0.25)"}}>
          <div className="flex flex-col gap-[16px]">
            <p className="text-[20px] font-bold text-[#1a1a19] leading-[1.2]"
               style={{fontFamily:"Helvetica Neue, Helvetica, sans-serif"}}>
              {question}
            </p>
            <hr className="border-t border-[#dbd8d5] w-full" />
          </div>
          <div className="flex flex-col gap-[16px]">
            {options.map(opt => {
              const isSel = multiSelect ? selected.includes(opt.value) : selected === opt.value;
              return (
                <OptionRow key={opt.value} label={opt.label} selected={isSel}
                           onClick={() => onSelect(opt.value)} />
              );
            })}
            {hint && (
              <p className="text-[16px] text-black leading-[1.5] italic py-[12px]"
                 style={{fontFamily:"Helvetica Neue, Helvetica, sans-serif"}}>
                {hint}
              </p>
            )}
          </div>
        </div>
      );
    }

    // ─── Step Navigation ──────────────────────────────────────────────────────
    function StepNav({ step, total, onBack, onNext, onSubmit }) {
      const isLast = step === total;
      return (
        <div className="flex items-center justify-between w-full mt-[32px]">
          <button onClick={onBack} disabled={step === 1}
            className="px-[32px] py-[12px] text-[14px] font-medium text-[#1a1a19] bg-white transition-opacity disabled:opacity-30"
            style={{borderRadius:999, border:"1px solid #dbd8d5",
                    fontFamily:"Helvetica Neue, Helvetica, sans-serif"}}>
            Back
          </button>
          <div className="flex gap-[6px] items-center">
            {Array.from({length:total}).map((_,i) => (
              <div key={i} className="rounded-full transition-all duration-200"
                   style={{
                     width: i+1===step ? 20 : 8, height: 8,
                     backgroundColor: i+1===step ? "#1a1a19" : "#dbd8d5"
                   }} />
            ))}
          </div>
          <button onClick={isLast ? onSubmit : onNext}
            className="px-[32px] py-[12px] text-[14px] font-medium text-white"
            style={{borderRadius:999, backgroundColor:"#1a1a19",
                    fontFamily:"Helvetica Neue, Helvetica, sans-serif"}}>
            {isLast ? "See my match" : "Next"}
          </button>
        </div>
      );
    }

    // ─── Complete Screen ──────────────────────────────────────────────────────
    function CompleteScreen({ onRestart }) {
      return (
        <div className="flex flex-col min-h-screen bg-white">
          <Nav />
          <main className="flex-1 relative overflow-hidden flex items-center justify-center">
            <img src={BG_TEXTURE} alt="" aria-hidden="true"
                 className="absolute inset-0 w-full h-full object-cover pointer-events-none"
                 style={{opacity:0.4}} />
            <div className="relative z-10 text-center px-8">
              <div className="bg-white rounded-[24px] p-[48px] max-w-[600px] mx-auto"
                   style={{boxShadow:"0px 1.4px 8px 0px rgba(26,26,25,0.25)"}}>
                <p className="text-[48px] mb-4">🥜</p>
                <h2 className="text-[28px] font-bold text-[#1a1a19] mb-4"
                    style={{fontFamily:"Helvetica Neue, Helvetica, sans-serif"}}>
                  Your match is ready!
                </h2>
                <p className="text-[16px] text-[#555] leading-[1.6] mb-[32px]"
                   style={{fontFamily:"Helvetica Neue, Helvetica, sans-serif"}}>
                  Based on your answers, we've found the perfect KIND Nuts+ blend for you.
                </p>
                <button onClick={onRestart}
                  className="px-[40px] py-[14px] text-[14px] font-medium text-white"
                  style={{borderRadius:999, backgroundColor:"#1a1a19",
                          fontFamily:"Helvetica Neue, Helvetica, sans-serif"}}>
                  Start over
                </button>
              </div>
            </div>
          </main>
          <Footer />
        </div>
      );
    }

    // ─── Question Data ────────────────────────────────────────────────────────
    const STEPS = [
      {
        id:"q1", label:"Question 1",
        questions:[{
          id:"goals", multiSelect:true,
          question:"What are you looking to get out of your daily nuts? (multi-select)",
          options:[
            {label:"Sustained Energy",          value:"sustained_energy"},
            {label:"Micronutrients & Electrolytes", value:"micronutrients"},
            {label:"Low sugar / Clean snacking", value:"low_sugar"},
            {label:"Something to munch on",     value:"munch"},
            {label:"I just love nuts! ❤️",      value:"love_nuts"},
          ],
        }],
      },
      {
        id:"q2", label:"Question 2",
        questions:[
          {
            id:"activity", multiSelect:false,
            question:"How active are you on a typical day?",
            options:[
              {label:"Mostly desk / low movement",                  value:"desk"},
              {label:"Light activity (walking, errands)",           value:"light"},
              {label:"Moderate workouts 3–4x/week",                value:"moderate"},
              {label:"Heavy training / endurance / sweating a lot", value:"heavy"},
            ],
          },
          {
            id:"sweat", multiSelect:false,
            question:"Follow-up: Do you sweat a lot when you exercise?",
            options:[
              {label:"Not really", value:"not_really"},
              {label:"Average",    value:"average"},
              {label:"A lot",      value:"a_lot"},
            ],
          },
        ],
      },
      {
        id:"q3", label:"Question 3",
        questions:[{
          id:"afternoon", multiSelect:false,
          question:"How do you usually feel mid-afternoon?",
          options:[
            {label:"Energized",                  value:"energized"},
            {label:"Slightly tired",             value:"slightly_tired"},
            {label:"Craving salty snacks",       value:"cravings"},
            {label:"Headache / foggy / drained", value:"headache"},
          ],
          hint:"Salt cravings and fatigue can be signs you need more electrolytes.",
        }],
      },
      {
        id:"q4", label:"Question 4",
        questions:[
          {
            id:"flavors", multiSelect:false,
            question:"What flavors do you naturally reach for?",
            options:[
              {label:"Bold & spicy 🌶️",   value:"bold_spicy"},
              {label:"Clean & classic 🧂", value:"clean_classic"},
              {label:"Savory-sweet 🍫",    value:"savory_sweet"},
              {label:"Herbal & mello 🍯",  value:"herbal_mello"},
            ],
          },
          {
            id:"flavor_detail", multiSelect:false,
            question:"Follow-up",
            options:[
              {label:"Sweet & savory",    value:"sweet_savory"},
              {label:"Mostly savory",     value:"mostly_savory"},
              {label:"Balanced",          value:"balanced"},
              {label:"Occasionally sweet",value:"occ_sweet"},
            ],
          },
        ],
      },
      {
        id:"q5", label:"Question 5",
        questions:[{
          id:"macros", multiSelect:false,
          question:"What macro's do you tend to under index in?",
          options:[
            {label:"Protein",      value:"protein"},
            {label:"Healthy Fats", value:"healthy_fats"},
            {label:"Carbs",        value:"carbs"},
          ],
        }],
      },
      {
        id:"q6", label:"Question 6",
        questions:[{
          id:"preferences", multiSelect:true,
          question:"Any preferences we should know?",
          options:[
            {label:"Lower sodium",        value:"lower_sodium"},
            {label:"Higher protein",      value:"higher_protein"},
            {label:"No added sugar",      value:"no_sugar"},
            {label:"Keto / low-carb friendly", value:"keto"},
            {label:"Plant-based focus!",  value:"plant_based"},
          ],
        }],
      },
      {
        id:"q7", label:"Question 7",
        questions:[{
          id:"timing", multiSelect:false,
          question:"When would you eat your daily nuts?",
          options:[
            {label:"Morning commute",    value:"morning_commute"},
            {label:"Mid-morning snack",  value:"mid_morning"},
            {label:"Pre-workout",        value:"pre_workout"},
            {label:"Post-workout",       value:"post_workout"},
            {label:"Afternoon slump",    value:"afternoon_slump"},
            {label:"Evening wind-down",  value:"evening"},
          ],
        }],
      },
    ];

    // ─── Main App ─────────────────────────────────────────────────────────────
    function Questions() {
      const [step, setStep]       = useState(0);
      const [answers, setAnswers] = useState({});
      const [done, setDone]       = useState(false);

      const currentStep = STEPS[step];

      function handleSelect(questionId, value, multiSelect) {
        setAnswers(prev => {
          if (multiSelect) {
            const current = prev[questionId] || [];
            return {
              ...prev,
              [questionId]: current.includes(value)
                ? current.filter(v => v !== value)
                : [...current, value],
            };
          }
          return { ...prev, [questionId]: value };
        });
      }

      function getSelected(questionId, multiSelect) {
        return multiSelect ? (answers[questionId] || []) : (answers[questionId] || null);
      }

      if (done) return <CompleteScreen onRestart={() => { setStep(0); setAnswers({}); setDone(false); }} />;

      return (
        <div className="flex flex-col min-h-screen bg-white">
          <Nav />
          <main className="flex-1 relative overflow-hidden">
            <img src={BG_TEXTURE} alt="" aria-hidden="true"
                 className="absolute inset-0 w-full h-full object-cover pointer-events-none"
                 style={{opacity:0.4}} />
            <div className="relative z-10 py-[80px] px-[104px] flex flex-col gap-[24px]">
              <p className="text-[24px] font-bold text-[#1a1a19] leading-[1.2]"
                 style={{fontFamily:"Helvetica Neue, Helvetica, sans-serif"}}>
                {currentStep.label}
              </p>
              <div className="flex flex-col gap-[24px] w-full max-w-[918px]">
                {currentStep.questions.map(q => (
                  <QuestionTile
                    key={q.id}
                    question={q.question}
                    options={q.options}
                    multiSelect={q.multiSelect}
                    selected={getSelected(q.id, q.multiSelect)}
                    onSelect={value => handleSelect(q.id, value, q.multiSelect)}
                    hint={q.hint}
                  />
                ))}
              </div>
              <div className="w-full max-w-[918px]">
                <StepNav
                  step={step + 1}
                  total={STEPS.length}
                  onBack={() => step > 0 && setStep(s => s - 1)}
                  onNext={() => step < STEPS.length - 1 && setStep(s => s + 1)}
                  onSubmit={() => setDone(true)}
                />
              </div>
            </div>
          </main>
          <Footer />
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<Questions />);
  </script>
</body>
</html>

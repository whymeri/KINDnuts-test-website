<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snickers +Nuts — Find Your Match</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body { margin: 0; font-family: 'Inter', sans-serif; }

    /* Diagonal stripe bg */
    .stripe-bg {
      background-image: repeating-linear-gradient(
        -45deg,
        transparent,
        transparent 18px,
        rgba(255,255,255,0.025) 18px,
        rgba(255,255,255,0.025) 36px
      );
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-in { animation: fadeUp 0.45s cubic-bezier(0.16, 1, 0.3, 1) both; }

    @keyframes popIn {
      from { opacity: 0; transform: scale(0.92); }
      to   { opacity: 1; transform: scale(1); }
    }
    .pop-in { animation: popIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both; }

    .font-display { font-family: 'Anton', sans-serif; }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
  const { useState, useEffect } = React;

  // ─── Brand colours ────────────────────────────────────────────────────────
  const RED    = '#E31837';
  const NAVY   = '#1B1464';
  const BROWN  = '#3D1C02';
  const GOLD   = '#FDB813';
  const CREAM  = '#FFF8EE';
  const DARK   = '#1A0A00';

  // ─── Radio icons ─────────────────────────────────────────────────────────
  function RadioOn() {
    return (
      <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
        <circle cx="11" cy="11" r="10" fill={NAVY}/>
        <circle cx="11" cy="11" r="4.5" fill="#fff"/>
      </svg>
    );
  }
  function RadioOff() {
    return (
      <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
        <circle cx="11" cy="11" r="10" stroke="#D8D3CC" strokeWidth="1.5" fill="white"/>
      </svg>
    );
  }
  function CheckOn() {
    return (
      <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
        <rect width="22" height="22" rx="6" fill={NAVY}/>
        <path d="M6 11.5l3.5 3.5L16 8" stroke="#fff" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
      </svg>
    );
  }
  function CheckOff() {
    return (
      <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
        <rect width="22" height="22" rx="6" stroke="#D8D3CC" strokeWidth="1.5" fill="white"/>
      </svg>
    );
  }

  // ─── Nav ─────────────────────────────────────────────────────────────────
  function Nav() {
    return (
      <nav style={{background: NAVY, borderBottom:`3px solid ${RED}`}}>
        <div style={{maxWidth:1100, margin:'0 auto', padding:'0 24px', height:68,
                     display:'flex', alignItems:'center', justifyContent:'space-between'}}>
          <a href="snickers.html">
            <img src="brand_assets/snickers/SnickersNuts-logo.png" alt="Snickers +Nuts"
                 style={{height:40, width:'auto', display:'block'}} />
          </a>
          <span style={{color:'rgba(255,255,255,0.45)', fontSize:'0.8125rem', fontWeight:600}}>
            Find Your Match
          </span>
        </div>
      </nav>
    );
  }

  // ─── Footer ──────────────────────────────────────────────────────────────
  function Footer() {
    return (
      <footer style={{background: DARK, padding:'40px 24px 28px'}}>
        <div style={{maxWidth:1100, margin:'0 auto'}}>
          <div style={{height:3, borderRadius:2, overflow:'hidden',
                       display:'flex', marginBottom:28}}>
            <span style={{flex:3, background:RED}}></span>
            <span style={{flex:1, background:GOLD}}></span>
          </div>
          <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', flexWrap:'wrap', gap:12}}>
            <div style={{display:'flex', gap:24, flexWrap:'wrap'}}>
              {['Accessibility','Privacy Policy','Site Map','Terms of Use'].map(l => (
                <a key={l} href="#"
                   style={{color:'rgba(255,255,255,0.3)', fontSize:'0.8125rem',
                           textDecoration:'none', transition:'color 0.15s'}}
                   onMouseOver={e => e.target.style.color='rgba(255,255,255,0.65)'}
                   onMouseOut={e => e.target.style.color='rgba(255,255,255,0.3)'}>
                  {l}
                </a>
              ))}
            </div>
            <p style={{color:'rgba(255,255,255,0.2)', fontSize:'0.75rem', margin:0}}>
              &copy; 2026 Mars Snacking
            </p>
          </div>
        </div>
      </footer>
    );
  }

  // ─── Option Row ──────────────────────────────────────────────────────────
  function OptionRow({ label, selected, onClick, multiSelect, accent }) {
    return (
      <button onClick={onClick}
        style={{
          width:'100%',
          display:'flex',
          alignItems:'center',
          background: selected ? `rgba(27,20,100,0.05)` : '#fff',
          textAlign:'left',
          border: selected ? `2px solid ${NAVY}` : '1.5px solid #E0DBD5',
          borderRadius: 10,
          minHeight: 56,
          cursor:'pointer',
          transition:'border-color 0.15s, background 0.15s, transform 0.12s',
          padding: 0,
          fontFamily:'Inter, sans-serif',
        }}
        onMouseOver={e => { if (!selected) e.currentTarget.style.borderColor = GOLD; }}
        onMouseOut={e => { if (!selected) e.currentTarget.style.borderColor = '#E0DBD5'; }}
      >
        <div style={{width:52, height:52, display:'flex', alignItems:'center',
                     justifyContent:'center', flexShrink:0}}>
          {multiSelect
            ? (selected ? <CheckOn/> : <CheckOff/>)
            : (selected ? <RadioOn/> : <RadioOff/>)
          }
        </div>
        <span style={{fontSize:'0.9375rem', color: DARK, lineHeight:1.5, paddingRight:16, fontWeight: selected ? 600 : 400}}>
          {label}
        </span>
        {selected && (
          <div style={{marginLeft:'auto', marginRight:14, width:6, height:6,
                       borderRadius:'50%', background:RED, flexShrink:0}}/>
        )}
      </button>
    );
  }

  // ─── Question Card ───────────────────────────────────────────────────────
  function QuestionCard({ question, options, multiSelect, selected, onSelect, hint, accent }) {
    return (
      <div className="fade-in" style={{
        background:'#fff',
        borderRadius: 16,
        boxShadow:'0 2px 20px rgba(26,10,0,0.1), 0 1px 4px rgba(26,10,0,0.06)',
        overflow:'hidden',
      }}>
        {/* Accent bar */}
        <div style={{height:4, background: accent || RED}}></div>
        <div style={{padding:28}}>
          <p style={{fontSize:'1.0625rem', fontWeight:700, color:DARK, lineHeight:1.35,
                     margin:'0 0 20px', fontFamily:'Inter, sans-serif'}}>
            {question}
          </p>
          <div style={{borderTop:`1px solid #EDE9E3`, marginBottom:20}}></div>
          <div style={{display:'flex', flexDirection:'column', gap:10}}>
            {options.map(opt => {
              const isSel = multiSelect
                ? (selected || []).includes(opt.value)
                : selected === opt.value;
              return (
                <OptionRow
                  key={opt.value}
                  label={opt.label}
                  selected={isSel}
                  multiSelect={multiSelect}
                  onClick={() => onSelect(opt.value)}
                  accent={accent}
                />
              );
            })}
            {hint && (
              <p style={{fontSize:'0.875rem', color:'rgba(26,10,0,0.45)', lineHeight:1.65,
                         fontStyle:'italic', margin:'6px 0 0', fontFamily:'Inter, sans-serif'}}>
                {hint}
              </p>
            )}
          </div>
        </div>
      </div>
    );
  }

  // ─── Progress Bar ────────────────────────────────────────────────────────
  function ProgressBar({ step, total }) {
    const pct = ((step - 1) / total) * 100;
    return (
      <div style={{marginBottom:32}}>
        <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:10}}>
          <span style={{fontSize:'0.75rem', fontWeight:700, color:'rgba(255,255,255,0.5)',
                        letterSpacing:'0.1em', textTransform:'uppercase'}}>
            Question {step} of {total}
          </span>
          <span style={{fontSize:'0.75rem', fontWeight:700, color:GOLD}}>
            {Math.round(pct)}% complete
          </span>
        </div>
        <div style={{height:6, background:'rgba(255,255,255,0.1)', borderRadius:3, overflow:'hidden'}}>
          <div style={{
            height:'100%',
            width:`${pct}%`,
            background:`linear-gradient(90deg, ${RED}, ${GOLD})`,
            borderRadius:3,
            transition:'width 0.4s cubic-bezier(0.34,1.56,0.64,1)',
          }}/>
        </div>
        <div style={{display:'flex', gap:6, marginTop:10}}>
          {Array.from({length:total}).map((_,i) => (
            <div key={i} style={{
              flex:1, height:3, borderRadius:2,
              background: i < step ? RED : 'rgba(255,255,255,0.1)',
              transition:'background 0.3s ease',
            }}/>
          ))}
        </div>
      </div>
    );
  }

  // ─── Step Nav ─────────────────────────────────────────────────────────────
  function StepNav({ step, total, onBack, onNext, onSubmit }) {
    const isLast = step === total;
    return (
      <div style={{display:'flex', alignItems:'center', justifyContent:'space-between', marginTop:28}}>
        <button onClick={onBack} disabled={step === 1}
          style={{
            padding:'12px 28px',
            borderRadius:6,
            border:`1.5px solid rgba(255,255,255,0.2)`,
            background:'transparent',
            color:'rgba(255,255,255,0.65)',
            fontWeight:600,
            fontSize:'0.875rem',
            cursor: step === 1 ? 'not-allowed' : 'pointer',
            opacity: step === 1 ? 0.3 : 1,
            fontFamily:'Inter, sans-serif',
            letterSpacing:'0.04em',
            textTransform:'uppercase',
            transition:'border-color 0.15s, color 0.15s',
          }}
          onMouseOver={e => { if (step > 1) { e.currentTarget.style.borderColor='rgba(255,255,255,0.5)'; e.currentTarget.style.color='#fff'; }}}
          onMouseOut={e => { e.currentTarget.style.borderColor='rgba(255,255,255,0.2)'; e.currentTarget.style.color='rgba(255,255,255,0.65)'; }}
        >
          &larr; Back
        </button>

        <button onClick={isLast ? onSubmit : onNext}
          style={{
            padding:'14px 36px',
            borderRadius:6,
            border:'none',
            background: isLast ? GOLD : RED,
            color: isLast ? NAVY : '#fff',
            fontWeight:800,
            fontSize:'0.9375rem',
            cursor:'pointer',
            fontFamily:'Inter, sans-serif',
            letterSpacing:'0.05em',
            textTransform:'uppercase',
            boxShadow: isLast
              ? `0 6px 20px rgba(253,184,19,0.45)`
              : `0 6px 20px rgba(227,24,55,0.4)`,
            transition:'background 0.15s, transform 0.12s, box-shadow 0.15s',
          }}
          onMouseOver={e => { e.currentTarget.style.transform='translateY(-1px)'; }}
          onMouseOut={e => { e.currentTarget.style.transform='translateY(0)'; }}
          onMouseDown={e => { e.currentTarget.style.transform='scale(0.97)'; }}
          onMouseUp={e => { e.currentTarget.style.transform='translateY(-1px)'; }}
        >
          {isLast ? '🥜 See My Match' : 'Next →'}
        </button>
      </div>
    );
  }

  // ─── Result Screen ────────────────────────────────────────────────────────
  const RESULTS = [
    {
      id:'power',
      name:'THE POWER MIX',
      tagline:"You're a Peanut Powerhouse.",
      desc:"High protein, maximum crunch, built for people who push hard and need fuel that keeps up. Your blend is heavy on peanuts and almonds, with a hit of cashews for creaminess.",
      nuts:'Peanuts · Almonds · Cashews',
      color: RED,
      textColor:'#fff',
      icon:'💪',
    },
    {
      id:'brain',
      name:'THE BRAIN BLEND',
      tagline:"Sharp mind. Steady energy.",
      desc:"You're a thinker. Your mix leads with walnuts for Omega-3s, with pistachios and hazelnuts for antioxidants and focus. Less crunch, more cognition.",
      nuts:'Walnuts · Pistachios · Hazelnuts',
      color: NAVY,
      textColor:'#fff',
      icon:'🧠',
    },
    {
      id:'balance',
      name:'THE BALANCED BITE',
      tagline:"A little of everything. Perfectly you.",
      desc:"You don't need to optimise — you need to enjoy. Your blend hits every flavour and macro note: peanuts, cashews, almonds, and a touch of pecan for that buttery finish.",
      nuts:'Peanuts · Cashews · Almonds · Pecans',
      color: BROWN,
      textColor:'#fff',
      icon:'⚖️',
    },
  ];

  function ResultScreen({ answers, onRestart }) {
    // Simple match logic based on answers
    const goals = answers['goals'] || [];
    let result = RESULTS[2]; // default: balanced
    if (goals.includes('sustained_energy') || goals.includes('micronutrients')) {
      result = RESULTS[0]; // power
    } else if (goals.includes('low_sugar')) {
      result = RESULTS[1]; // brain
    }

    return (
      <div style={{minHeight:'100vh', display:'flex', flexDirection:'column', background:CREAM}}>
        <Nav />
        <main style={{flex:1, display:'flex', alignItems:'center', justifyContent:'center', padding:'64px 24px'}}>
          <div className="pop-in" style={{
            maxWidth:620, width:'100%',
            background:'#fff',
            borderRadius:20,
            overflow:'hidden',
            boxShadow:'0 8px 48px rgba(26,10,0,0.14), 0 2px 8px rgba(26,10,0,0.08)',
          }}>
            {/* Result header */}
            <div style={{background:result.color, padding:'48px 40px 40px', textAlign:'center', position:'relative'}}>
              <div style={{
                fontSize:'4rem', marginBottom:16,
                animation:'fadeUp 0.6s cubic-bezier(0.34,1.56,0.64,1) 0.1s both',
              }}>
                {result.icon}
              </div>
              <img src="brand_assets/snickers/SnickersNuts-logo.png" alt="Snickers +Nuts"
                   style={{height:36, margin:'0 auto 20px', display:'block', opacity:0.85}} />
              <div style={{
                fontFamily:'Anton, sans-serif',
                color: result.textColor,
                fontSize:'clamp(1.75rem, 4vw, 2.75rem)',
                letterSpacing:'0.01em',
                lineHeight:0.95,
                marginBottom:12,
              }}>
                {result.name}
              </div>
              <p style={{
                color: result.textColor === '#fff' ? 'rgba(255,255,255,0.7)' : 'rgba(26,10,0,0.6)',
                fontSize:'1rem',
                fontStyle:'italic',
                margin:0,
              }}>
                "{result.tagline}"
              </p>
            </div>

            {/* Result body */}
            <div style={{padding:'36px 40px 40px'}}>
              <p style={{fontSize:'1rem', color:'rgba(26,10,0,0.65)', lineHeight:1.75,
                         margin:'0 0 20px', fontFamily:'Inter, sans-serif'}}>
                {result.desc}
              </p>

              <div style={{
                background:CREAM,
                borderRadius:10,
                padding:'16px 20px',
                marginBottom:28,
                borderLeft:`4px solid ${GOLD}`,
              }}>
                <p style={{fontSize:'0.75rem', fontWeight:700, color:'rgba(26,10,0,0.4)',
                           letterSpacing:'0.1em', textTransform:'uppercase', margin:'0 0 4px'}}>Your Blend</p>
                <p style={{fontSize:'0.9375rem', fontWeight:700, color:DARK, margin:0}}>
                  {result.nuts}
                </p>
              </div>

              <div style={{display:'flex', gap:12, flexWrap:'wrap'}}>
                <a href="snickers.html" style={{
                  flex:1, minWidth:140,
                  padding:'14px 20px',
                  borderRadius:6,
                  border:`2px solid ${NAVY}`,
                  background:'transparent',
                  color:NAVY,
                  fontWeight:700,
                  fontSize:'0.875rem',
                  textAlign:'center',
                  textDecoration:'none',
                  letterSpacing:'0.04em',
                  textTransform:'uppercase',
                  fontFamily:'Inter, sans-serif',
                  transition:'background 0.15s',
                }}
                  onMouseOver={e => { e.currentTarget.style.background=NAVY; e.currentTarget.style.color='#fff'; }}
                  onMouseOut={e => { e.currentTarget.style.background='transparent'; e.currentTarget.style.color=NAVY; }}
                >
                  Explore More
                </a>
                <button onClick={onRestart} style={{
                  flex:1, minWidth:140,
                  padding:'14px 20px',
                  borderRadius:6,
                  border:'none',
                  background:RED,
                  color:'#fff',
                  fontWeight:800,
                  fontSize:'0.875rem',
                  letterSpacing:'0.04em',
                  textTransform:'uppercase',
                  cursor:'pointer',
                  fontFamily:'Inter, sans-serif',
                  boxShadow:`0 4px 16px rgba(227,24,55,0.35)`,
                  transition:'background 0.15s',
                }}>
                  Retake Quiz
                </button>
              </div>
            </div>
          </div>
        </main>
        <Footer />
      </div>
    );
  }

  // ─── Question Data ────────────────────────────────────────────────────────
  const ACCENTS = [RED, NAVY, BROWN, RED, NAVY, BROWN, RED];

  const STEPS = [
    {
      id:'q1', label:'Question 1',
      questions:[{
        id:'goals', multiSelect:true,
        question:'What are you looking to get from your daily nuts? (pick all that apply)',
        options:[
          {label:'Sustained energy throughout the day',    value:'sustained_energy'},
          {label:'Micronutrients & electrolytes',          value:'micronutrients'},
          {label:'Low sugar / clean snacking',             value:'low_sugar'},
          {label:'Something satisfying to munch on',       value:'munch'},
          {label:'I just love nuts ❤️',                    value:'love_nuts'},
        ],
      }],
    },
    {
      id:'q2', label:'Question 2',
      questions:[
        {
          id:'activity', multiSelect:false,
          question:'How active are you on a typical day?',
          options:[
            {label:'Mostly desk work / low movement',            value:'desk'},
            {label:'Light activity — walking, errands, etc.',    value:'light'},
            {label:'Moderate workouts 3–4× a week',             value:'moderate'},
            {label:'Heavy training / endurance / high sweat',   value:'heavy'},
          ],
        },
        {
          id:'sweat', multiSelect:false,
          question:'Do you sweat a lot when you exercise?',
          options:[
            {label:'Not really',  value:'not_really'},
            {label:'Average',     value:'average'},
            {label:'A lot',       value:'a_lot'},
          ],
        },
      ],
    },
    {
      id:'q3', label:'Question 3',
      questions:[{
        id:'afternoon', multiSelect:false,
        question:'How do you usually feel mid-afternoon?',
        options:[
          {label:'Energised and sharp',                value:'energized'},
          {label:'Slightly tired',                     value:'slightly_tired'},
          {label:'Craving salty snacks',               value:'cravings'},
          {label:'Headache / foggy / drained',         value:'headache'},
        ],
        hint:'💡 Salt cravings and afternoon fatigue can signal you need more electrolytes.',
      }],
    },
    {
      id:'q4', label:'Question 4',
      questions:[
        {
          id:'flavors', multiSelect:false,
          question:'What flavours do you naturally reach for?',
          options:[
            {label:'Bold & spicy 🌶️',     value:'bold_spicy'},
            {label:'Clean & classic 🧂',   value:'clean_classic'},
            {label:'Savory-sweet 🍫',      value:'savory_sweet'},
            {label:'Herbal & mellow 🍯',   value:'herbal_mello'},
          ],
        },
        {
          id:'flavor_detail', multiSelect:false,
          question:'When it comes to sweetness, you prefer…',
          options:[
            {label:'Sweet & savory together',    value:'sweet_savory'},
            {label:'Mostly savory',              value:'mostly_savory'},
            {label:'A balanced mix',             value:'balanced'},
            {label:'Occasionally a hint of sweet', value:'occ_sweet'},
          ],
        },
      ],
    },
    {
      id:'q5', label:'Question 5',
      questions:[{
        id:'macros', multiSelect:false,
        question:'Which macro do you tend to under-index on?',
        options:[
          {label:'Protein',       value:'protein'},
          {label:'Healthy Fats',  value:'healthy_fats'},
          {label:'Carbs',         value:'carbs'},
          {label:'Not sure',      value:'not_sure'},
        ],
      }],
    },
    {
      id:'q6', label:'Question 6',
      questions:[{
        id:'preferences', multiSelect:true,
        question:'Any preferences we should factor in? (pick all that apply)',
        options:[
          {label:'Lower sodium',             value:'lower_sodium'},
          {label:'Higher protein',           value:'higher_protein'},
          {label:'No added sugar',           value:'no_sugar'},
          {label:'Keto / low-carb friendly', value:'keto'},
          {label:'Plant-based focus',        value:'plant_based'},
        ],
      }],
    },
    {
      id:'q7', label:'Question 7',
      questions:[{
        id:'timing', multiSelect:false,
        question:'When would you most likely eat your daily nuts?',
        options:[
          {label:'Morning commute',    value:'morning_commute'},
          {label:'Mid-morning snack',  value:'mid_morning'},
          {label:'Pre-workout',        value:'pre_workout'},
          {label:'Post-workout',       value:'post_workout'},
          {label:'Afternoon slump',    value:'afternoon_slump'},
          {label:'Evening wind-down',  value:'evening'},
        ],
      }],
    },
  ];

  // ─── Main App ─────────────────────────────────────────────────────────────
  function Quiz() {
    const [step, setStep]       = useState(0);
    const [answers, setAnswers] = useState({});
    const [done, setDone]       = useState(false);
    const [key, setKey]         = useState(0); // force re-mount for animation

    const currentStep = STEPS[step];
    const accent = ACCENTS[step];

    function handleSelect(questionId, value, multiSelect) {
      setAnswers(prev => {
        if (multiSelect) {
          const cur = prev[questionId] || [];
          return {
            ...prev,
            [questionId]: cur.includes(value)
              ? cur.filter(v => v !== value)
              : [...cur, value],
          };
        }
        return { ...prev, [questionId]: value };
      });
    }

    function getSelected(questionId, multiSelect) {
      return multiSelect ? (answers[questionId] || []) : (answers[questionId] || null);
    }

    function goNext() {
      if (step < STEPS.length - 1) { setStep(s => s+1); setKey(k => k+1); }
    }
    function goBack() {
      if (step > 0) { setStep(s => s-1); setKey(k => k+1); }
    }
    function submit() { setDone(true); }

    if (done) {
      return <ResultScreen answers={answers} onRestart={() => { setStep(0); setAnswers({}); setDone(false); setKey(k=>k+1); }} />;
    }

    return (
      <div style={{minHeight:'100vh', display:'flex', flexDirection:'column'}}>
        <Nav />

        <main className="stripe-bg" style={{
          flex:1,
          background:`linear-gradient(160deg, ${NAVY} 0%, #0d0a3a 100%)`,
          position:'relative',
        }}>
          {/* Ambient glows */}
          <div style={{position:'absolute', top:-100, left:-80, width:500, height:500,
                       borderRadius:'50%', pointerEvents:'none',
                       background:`radial-gradient(circle, rgba(227,24,55,0.15) 0%, transparent 70%)`}}/>
          <div style={{position:'absolute', bottom:-80, right:-60, width:400, height:400,
                       borderRadius:'50%', pointerEvents:'none',
                       background:`radial-gradient(circle, rgba(253,184,19,0.1) 0%, transparent 70%)`}}/>

          <div style={{maxWidth:940, margin:'0 auto', padding:'56px 24px 64px', position:'relative', zIndex:2}}>

            {/* Step label */}
            <div style={{display:'flex', alignItems:'center', gap:12, marginBottom:28}}>
              <div style={{
                background: accent,
                color:'#fff',
                fontFamily:'Anton, sans-serif',
                fontSize:'0.75rem',
                letterSpacing:'0.12em',
                padding:'5px 14px',
                borderRadius:4,
              }}>
                {currentStep.label.toUpperCase()}
              </div>
              <div style={{height:2, flex:1, background:'rgba(255,255,255,0.08)', borderRadius:1}}>
                <div style={{
                  height:'100%',
                  width:`${((step+1)/STEPS.length)*100}%`,
                  background:`linear-gradient(90deg, ${accent}, ${GOLD})`,
                  borderRadius:1,
                  transition:'width 0.45s cubic-bezier(0.34,1.56,0.64,1)',
                }}/>
              </div>
              <span style={{color:'rgba(255,255,255,0.35)', fontSize:'0.75rem', fontWeight:600,
                            whiteSpace:'nowrap'}}>
                {step+1} / {STEPS.length}
              </span>
            </div>

            {/* Question cards */}
            <div key={key} style={{display:'flex', flexDirection:'column', gap:20}}>
              {currentStep.questions.map(q => (
                <QuestionCard
                  key={q.id}
                  question={q.question}
                  options={q.options}
                  multiSelect={q.multiSelect}
                  selected={getSelected(q.id, q.multiSelect)}
                  onSelect={v => handleSelect(q.id, v, q.multiSelect)}
                  hint={q.hint}
                  accent={accent}
                />
              ))}
            </div>

            {/* Nav */}
            <StepNav
              step={step+1}
              total={STEPS.length}
              onBack={goBack}
              onNext={goNext}
              onSubmit={submit}
            />

          </div>
        </main>

        <Footer />
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<Quiz />);
</script>
</body>
</html>
